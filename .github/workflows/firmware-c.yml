name: Firmware (C probe fork)

# Manual-only, mirroring PicoInky's firmware.yml: runs on the SHARED self-hosted org runner, so it
# must never fire on push/PR/tag — only when a human clicks "Run workflow"
# (or `gh workflow run firmware-c.yml -f version=X.Y.Z`). Politeness contract for a shared runner.
#
# Builds the Hackagotchi probe fork (debugprobe-v2.2.3 overlay) and runs the static-analysis gate.
# Reuses the same fw-build cache the runner already has (pinned Arm GCC 13.3.Rel1 + pico-sdk 2.2.0),
# so it matches the proven local build_fork.sh recipe.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Firmware version (e.g. 0.1.0). Tag will be v<version> if publishing."
        type: string
        required: true
      publish_release:
        description: "Publish a GitHub Release with the .uf2 + .elf (otherwise just artifacts)."
        type: boolean
        default: false

concurrency:
  group: firmware-c-build
  cancel-in-progress: false

permissions:
  contents: write   # for the optional Release

jobs:
  build:
    name: Build + static-analysis gate
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 45
    env:
      # The self-hosted runner's persistent toolchain/SDK cache (pinned Arm GCC + pico-sdk). Set the
      # FW_BUILD_DIR repo/Actions variable to the runner's path; the fallback below is only a placeholder.
      FWBUILD: ${{ vars.FW_BUILD_DIR || '/opt/fw-build' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Fetch upstream (debugprobe-v2.2.3)
        working-directory: firmware/c
        run: |
          set -euo pipefail
          export PICO_SDK_PATH="${FWBUILD}/micropython/lib/pico-sdk"
          ./setup.sh

      - name: Build fork (pinned Arm GCC 13.3 + pico-sdk 2.2.0)
        id: build
        working-directory: firmware/c
        run: |
          set -euo pipefail
          # Thread the release semver into the binary so {"q":"status"} reports "ver" matching the tag.
          VERSION='${{ inputs.version }}' ./build_fork.sh
          echo "uf2=$(pwd)/build/hackagotchi_probe.uf2" >> "$GITHUB_OUTPUT"
          echo "elf=$(pwd)/build/hackagotchi_probe.elf" >> "$GITHUB_OUTPUT"
          # Provenance: the descriptor + pin map are embedded; surface them in the log.
          picotool info -a build/hackagotchi_probe.uf2 || true

      - name: Static-analysis gate (GCC -fanalyzer + cppcheck)
        working-directory: firmware/c
        run: ./analyze.sh

      - name: Upload artifacts (.uf2 + .elf — .elf needed to symbolicate fault dumps)
        uses: actions/upload-artifact@v4
        with:
          name: hackagotchi-probe-c-${{ inputs.version }}
          path: |
            firmware/c/build/hackagotchi_probe.uf2
            firmware/c/build/hackagotchi_probe.elf
          if-no-files-found: error

      - name: Publish GitHub Release
        if: ${{ inputs.publish_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="v${{ inputs.version }}"
          # Release notes: prefer a curated docs/RELEASE_NOTES_v<ver>.md, else the CHANGELOG section, else a default.
          notes="$(mktemp)"
          rel="docs/RELEASE_NOTES_v${{ inputs.version }}.md"
          if [ -f "$rel" ]; then
            cp "$rel" "$notes"; echo "(release notes from $rel)"
          elif awk -v v="${{ inputs.version }}" '
                $0 ~ "^## \\[?"v"\\]?([^0-9]|$)" {grab=1; next}
                grab && /^## / {exit}
                grab {print}
              ' CHANGELOG.md > "$notes" 2>/dev/null && [ -s "$notes" ]; then
            echo "(release notes sourced from CHANGELOG.md)"
          else
            echo "debugprobe-v2.2.3 fork: CMSIS-DAP probe + UART bridge + JSON-control CDC + SD black-box recorder + OLED dashboard. Static-analysis gate green; HIL gates attested on the release image (see docs/release-readiness.md)." > "$notes"
          fi
          # Attach the binaries + the attribution docs the NOTICE requires shipping with the image.
          gh release create "$tag" \
            --title "Hackagotchi probe firmware (C) v${{ inputs.version }}" \
            --notes-file "$notes" \
            firmware/c/build/hackagotchi_probe.uf2 \
            firmware/c/build/hackagotchi_probe.elf \
            firmware/c/THIRD-PARTY-NOTICES.md \
            firmware/c/LICENSE

  # The portable-logic host tests (SPSC ring, recorder wedge/heartbeat machine, sprite blit) run in the
  # separate, GitHub-HOSTED host-tests.yml (push/PR) — they need no probe, so they don't belong on this
  # manual self-hosted build job. Each runs its verify-the-verifier break build too, so the check can fail.
